server {
	server_name localhost; #not necessary
    port 8002; #can have more than one directive
    host 121.0.0.1; #only one
    root docs/fusion_web/;
    client_limit 3000000; #aaaaaaa
	index index.html;
    error_page 404 error_pages/404.html;
}

    location / {
        allow_methods  DELETE POST GET;
        autoindex off;
    }

    location /tours {
        autoindex on;
        index tours1.html;
        allow_methods GET POST PUT HEAD;
    }

	location /red {
		return /tours;
	}

    location /cgi-bin {
        root ./;
        allow_methods GET POST DELETE;
        index time.py;
        cgi_path /usr/bin/python3 /bin/bash;
        cgi_ext .py .sh;
    }