server {
	server_name localhost; #not necessary
    listen 8002; #can have more than one directive
    root .default/test;
    client_body_size 3000000;
	index index2.html index4.html; #can have more than one value
    error_page 404 error_pages/404.html;
    error_page 401 error_pages/401.html;

    location / {
        allow_methods DELETE POST; 
        autoindex on;
		return 505 /tours;
        index tours1.html;
        root ./;
    }
}

server {
	server_name localhost2;      #not necessary
    listen 9000; #can have more than one directive
    root src;
    client_body_size 3000000;
	index index.html index2.html; #can have more than one value
    error_page 404 error_pages/404.html;
    error_page 401 error_pages/401.html;

    location / {
        allow_methods DELETE POST GET; #
        autoindex on;
		return 505 /tours;
        index tours1.html;
        root ./;
    }
}


