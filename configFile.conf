server {
	server_name localhost; #not necessary
    port 8002; #can have more than one directive
    host 127.0.0.1; #only one
    root src; #a valid path
    client_limit 3000000; #aaaaaaa
	index index.html index2.html; #can have more than one value
    error_page 404 error_pages/404.html;
    error_page 401 error_pages/401.html;

    location / {
        allow_methods DELETE POST GET;
        autoindex on;
		return 505 /tours;
        index tours1.html           ;
        root ./;
    }
}

    location /tours {
        autoindex on;
        allow_methods GET POST PUT HEAD;
    }

	location /red {
	}

    location /cgi-bin {
        allow_methods GET POST DELETE;
        index time.py;
        cgi_path /usr/bin/python3 /bin/bash;
        cgi_ext .py .sh;
    }